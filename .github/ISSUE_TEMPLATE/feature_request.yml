name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE]: "
labels: ["feature", "triage"]
assignees:
  -
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      placeholder: Tell us what you're trying to accomplish and why the current state doesn't meet your needs.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the solution you'd like to see implemented.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Tell us about any alternative approaches you've considered.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      description: Please indicate the scope of this feature request
      options:
        - label: This affects the frontend (React/TypeScript)
          required: false
        - label: This affects the backend (Python/FastAPI)
          required: false
        - label: This affects both frontend and backend
          required: false
        - label: This is primarily documentation or UX
          required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: Link to designs, related issues, or any other relevant information.
    validations:
      required: false